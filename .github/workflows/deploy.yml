name: Deploy Node API to Server (Auto Install)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Deploy Files
      - name: Deploy via Rsync
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete --exclude='.env' --exclude='node_modules'
          path: ./
          remote_path: /var/www/node_api/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}

      # 3️⃣ Setup Server & Start App
      - name: Setup Server & Start App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Checking Node.js..."
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            echo "📁 Going to project directory..."
            cd /var/www/node_api

            echo "📦 Installing dependencies..."
            npm install

            echo "🔍 Checking if app is already running..."
            # Angalia kama app inaendeshwa kwenye port 3000 (badilisha kama port yako ni tofauti)
            if lsof -Pi :3000 -sTCP:LISTEN -t >/dev/null ; then
              echo "🛑 Stopping existing app on port 3000..."
              kill -9 $(lsof -t -i:3000) 2>/dev/null || true
            fi

            echo "🚀 Starting app with npm start..."
            # Anzisha app kwenye background
            nohup npm start > app.log 2>&1 &

            # Subiri kidogo app ianze
            sleep 5

            # Angalia kama app imeanza vizuri
            if lsof -Pi :3000 -sTCP:LISTEN -t >/dev/null ; then
              echo "✅ App imeanza vizuri kwenye port 3000!"
              echo "📋 Process ID: $(lsof -t -i:3000)"
            else
              echo "❌ App imeshindwa kuanza. Angalia error kwenye app.log"
              tail -n 20 app.log
              exit 1
            fi

            echo ""
            echo "═══════════════════════════════════════════"
            echo "🎉 DEPLOYMENT COMPLETE!"
            echo "═══════════════════════════════════════════"
            echo "📌 App inaendeshwa kwenye: http://${{ secrets.SERVER_HOST }}:3000"
            echo "📊 Angalia logs: tail -f /var/www/node_api/app.log"
            echo "🛑 Kuacha app: pkill -f 'node' au linda process manually"